<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>绑定class样式</title>
    <style>
        .basic {
            width: 400px;
            height: 100px;
            border: 1px solid black;
        }

        .happy {
            border: 4px solid red;
            ;
            background-color: rgba(255, 255, 0, 0.644);
            background: linear-gradient(30deg, yellow, pink, orange, yellow);
        }

        .sad {
            border: 4px dashed rgb(2, 197, 2);
            background-color: gray;
        }

        .normal {
            background-color: skyblue;
        }

        .style1 {
            background-color: yellowgreen;
        }

        .style2 {
            font-size: 30px;
            text-shadow: 2px 2px 10px red;
        }

        .style3 {
            border-radius: 20px;
        }
    </style>
    <script src="../js/vue.js"></script>
</head>
<body>
    <div id="root">
        <!-- 绑定class样式--字符串写法 -->
        <!-- 适用于类名不确定动态指定 -->
        <div class="basic" :class="mood" @click="changemood">{{ name }}</div><br>

        <!-- 绑定class样式--数组写法 -->
        <!-- 适用于需要绑定多个类名 -->
        <div class="basic" :class="classArr">{{ name }}</div><br>

        <!-- 绑定class样式--对象写法 -->
        <!-- 适用于需要动态绑定多个类名 -->
        <div class="basic" :class="classObj">{{ name }}</div><br>



        <!-- 绑定style样式--对象写法 -->
        <!-- 适用于需要动态绑定多个样式 -->
        <div class="basic" :style="styleObj">{{ name }}</div><br>
        <!-- 数组写法，数组内容为样式对象 -->
        <div class="basic" :style="[styleObj, styleObj2]">{{ name }}</div>
    </div>
    <script>
        const vm = new Vue({
            el: '#root',
            data() {
                return {
                    name: 'Jack',
                    mood: 'normal', // 绑定一个类名
                    classArr: ['style1', 'style2', 'style3'], // 绑定一个类名数组
                    classObj: { // 绑定一个类名对象
                        style1: false,
                        style2: true,
                    },
                    // 绑定一个样式对象
                    styleObj: {
                        color: 'blue',
                        fontSize: '60px',
                    },
                    styleObj2: {
                        backgroundColor: 'pink',
                    }
                }
            },
            methods: {
                changemood() {
                    // this.mood = 'happy'; // 直接指定一个类名字符串
                    const moods = ['happy', 'sad', 'normal'];
                    const index = Math.floor(Math.random() * 3) // 0-2的随机整数
                    this.mood = moods[index];
                }
            }
        })
    </script>
</body>
</html>
