<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模版语法</title>
    <script src="../js/vue.js"></script>
</head>
<body>
    <div id="root">
        <h1>插值语法</h1>
        <h3>你好，{{ name }}</h3>
        <hr>

        <h1>指令语法</h1>
        <!-- 简写: v-bind:href="URL" -->
        <!-- 正常写法: v-bind:href="URL" -->
        <a :href="link.URL" target="_blank" v-bind:x="Hello">点击访问{{ link.address }}</a>
    </div>
    <script>
        Vue.config.productionTip = false;
        const app = new Vue({
            el: '#root',
            data: {
                name: 'Jack',
                Hello: 'Hello Vue!',
                link: {
                    URL: 'http://www.baidu.com',
                    address: "百度"
                }
            }
        });
    </script>
</body>
</html>
