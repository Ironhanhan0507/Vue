<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深度监视</title>
    <script src="../js/vue.js"></script>
</head>
<body>
    <div id="root">
        <h1>{{ city }}的天气是{{ info }}</h1>
        <button @click="changeWeather">切换天气</button>
        <hr>
        <h3>数字变化：{{ nums.a }}, {{ nums.b }}</h3>
        <button @click="nums.a++">点我a+1</button>
        <button @click="nums.b++">点我b+1</button>
    </div>

    <script>
        // computed和watch对比      
        const vm = new Vue({
            el: '#root',
            data() {
                return {
                    city: '北京',
                    isRain: false,
                    nums: {
                        a: 1,
                        b: 2
                    }
                }
            },
            computed: {
                info() {
                    return this.isRain ? '下雨' : '晴天';
                }
            },
            methods: {
                changeWeather() {
                    this.isRain = !this.isRain;
                }
            },
            // 监听属性变化 完整写法
            watch: {
                // isRain: {
                //     immediate: true, // 立即执行一次handler函数 
                //     // 监听isRain属性的变化
                //     handler(newVal, oldVal) {
                //         console.log('天气发生了变化！', newVal, oldVal);
                //     }
                // },
                // 深度监听nums对象的变化
                // nums: {
                //     deep: true, // 深度监听对象的变化
                //     handler(newVal, oldVal) {
                //         console.log('nums对象发生了变化！', newVal, oldVal);
                //     }
                // },
                // 监视属性的简写 无immediate，无deep配置
                isRain(newVal, oldVal) {
                    console.log('天气发生了变化！', newVal, oldVal);
                }
            }
        })
        // 简写
        vm.$watch('isRain', function (newVal, oldVal) {
            console.log('isRain属性发生了变化！', newVal, oldVal);
        }) 
    </script>
</body>
</html>
