<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>列表渲染key的原理</title>
    <script src="../js/vue.js"></script>
</head>
<body>
    <div id="root">
        <!-- 总结key的原理 -->
        <!-- 1. key的作用是为了优化性能，key的值应该具有唯一性 -->
        <!-- 2. Vue通过key来判断哪些元素发生了变化，哪些元素被添加或删除 -->
        <!-- 3. 当列表发生变化时，Vue会根据key来重新渲染列表，而不是重新渲染整个列表 -->
        <!-- 4. 如果没有key，Vue会使用默认的算法来比较新旧节点，这可能会导致性能问题 -->
        <!-- 5. 使用index作为key可能会导致性能问题，因为当列表发生变化时，index可能会改变 -->
        <!-- 6. 使用唯一的id作为key可以确保性能优化，因为当列表发生变化时，Vue可以准确地识别哪些元素发生了变化 -->
        <!-- 
            面试题：react、vue中的key有什么作用？（key的内部原理）
            						
            	1. 虚拟DOM中key的作用：
            	    key是虚拟DOM对象的标识，当数据发生变化时，Vue会根据【新数据】生成【新的虚拟DOM】, 
            		随后Vue进行【新虚拟DOM】与【旧虚拟DOM】的差异比较，比较规则如下：
            										
            	2.对比规则：
            	    (1).旧虚拟DOM中找到了与新虚拟DOM相同的key：
            		    ①.若虚拟DOM中内容没变, 直接使用之前的真实DOM！
            		    ②.若虚拟DOM中内容变了, 则生成新的真实DOM，随后替换掉页面中之前的真实DOM。
            
            	    (2).旧虚拟DOM中未找到与新虚拟DOM相同的key创建新的真实DOM，随后渲染到到页面。
            												
            	3. 用index作为key可能会引发的问题：
            		1. 若对数据进行：逆序添加、逆序删除等破坏顺序操作:会产生没有必要的真实DOM更新 ==> 界面效果没问题, 但效率低。
            
            	    2. 如果结构中还包含输入类的DOM：会产生错误DOM更新 ==> 界面有问题。
            
            	4. 开发中如何选择key?:
            		1.最好使用每条数据的唯一标识作为key, 比如id、手机号、身份证号、学号等唯一值。
            		2.如果不存在对数据的逆序添加、逆序删除等破坏顺序操作，仅用于渲染列表用于展示，使用index作为key是没有问题的。
        -->
        <ul>
            <!-- <li v-for="(item, index) in list" :key="index"> -->
            <li v-for="(item, index) in list" :key="item.id">
                {{ item.n }}-{{ item.name }}-{{ index }}
                <input type="text">
            </li>
        </ul>
        <button @click="add">添加一条数据</button>
    </div>
    <script>
        const vm = new Vue({
            el: '#root',
            data: {
                list: [
                    { name: 'Angular', id: 1, n: "001" },
                    { name: 'React', id: 2, n: "002" },
                    { name: 'Vue', id: 3, n: "003" }
                ],
            },
            methods: {
                add() {
                    const newItem = { name: 'Python', id: 4, n: "004" };
                    this.list.unshift(newItem);
                }
            }
        })
    </script>
</body>
</html>
