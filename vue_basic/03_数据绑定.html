<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据绑定</title>
    <script src="../js/vue.js"></script>
</head>
<body>
    <div id="root">
        <!-- v-bind单向数据绑定 -->
        单向数据绑定: <input type="text" :value="name">
        <br>
        <!-- v-model双向数据绑定 -->
        双向数据绑定: <input type="text" v-model:value="name">
        <br>

        <!-- v-model简写 -->
        双向数据绑定: <input type="text" v-model="name">

        <!-- 如下代码是错误的，v-model只能应用于表单元素 要有value属性 -->
        <h3 v-model:x="name">你好</h3>
    </div>
    <script>
        Vue.config.productionTip = false;
        const app = new Vue({
            el: '#root',
            data: {
                name: 'Jack',
            }
        });
    </script>
</body>
</html>
