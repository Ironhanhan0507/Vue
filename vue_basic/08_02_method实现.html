<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Method实现</title>
    <script src="../js/vue.js"></script>
</head>
<body>
    <!-- method实现 -->
    <div id="root">
        姓1：<input type="text" v-model="firstName"><br><br>
        名1：<input type="text" v-model="lastName"><br><br>
        全名1：<span>{{ fullname() }}</span>
    </div>
    <script>
        const vm = new Vue({
            el: "#root",
            data() {
                return {
                    firstName: 'John',
                    lastName: 'Doe'
                }
            },
            methods: {
                fullname() {
                    return this.firstName + ' ' + this.lastName;
                }
            }
        })
    </script>
</body>
</html>
